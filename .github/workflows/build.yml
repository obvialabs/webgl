# Workflow name
name: Build Package

# Workflow conditions
on:
  # Run on pushes to main and develop branches
  push:
    branches: [ main ]
  # Run on pull requests targeting main and develop
  pull_request:
    branches: [ main ]

# Workflow jobs
jobs:
  # Job (Build node 22.x)
  build-node22:
    # Job name shown in GitHub Actions UI
    name: Node 22.x
    # Runner environment (Ubuntu)
    runs-on: ubuntu-latest
    # Job steps
    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4
      # Setup Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # Install corepack and enable pnpm
      - name: Install corepack@0.31
        run: npm install -g corepack@0.31
      - name: Enable corepack
        run: corepack enable
      # Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Build project
      - name: Build package
        run: pnpm build

  # Job (Build node 23.x)
  build-node23:
    name: Node 23.x
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
      - name: Install corepack@0.31
        run: npm install -g corepack@0.31
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build project
        run: pnpm build

  # Job (Build node 24.x)
  build-node24:
    name: Node 24.x
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install corepack@0.31
        run: npm install -g corepack@0.31
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build package
        run: pnpm build

  # Job (Upload artifact)
  upload-artifact:
    # Job name shown in GitHub Actions UI
    name: Upload artifact
    runs-on: ubuntu-latest
    needs: [build-node22, build-node23, build-node24]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      # Checkout repository
      - uses: actions/checkout@v4
      # Upload build artifact (dist folder + metadata files)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: |
            dist/
            readme.md
            package.json
            license.md
