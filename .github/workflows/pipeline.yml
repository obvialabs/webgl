# Workflow name
name: WebGL

# Workflow conditions
on:
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
  # Trigger workflow on pushes to main branch
  push:
    branches: [ main ]
    # Trigger workflow on version tags (e.g., v1.2.3)
    tags:
      - 'v*.*.*'
  # Trigger workflow on pull requests targeting main branch
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Permissions required for CodeQL and publishing
permissions:
  actions: read          # Allow reading workflow actions
  contents: read         # Allow reading repository contents
  security-events: write # Allow writing security scan results

# Ensure only one workflow runs per ref at a time
concurrency: ${{ github.workflow }}-${{ github.ref }}

# Workflow jobs
jobs:
  # Job (Build package)
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository code
      - uses: actions/checkout@v6
      # Step 2: Setup Node.js 24 environment
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      # Step 3: Install corepack globally
      - name: Install corepack@0.31
        run: npm install -g corepack@0.31
      # Step 4: Enable corepack (pnpm support)
      - name: Enable corepack
        run: corepack enable
      # Step 5: Install dependencies with pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Step 6: Build project
      - name: Build package
        run: pnpm build
      # Step 7: Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: webgl
          path: |
            dist/
            readme.md
            package.json
            license.md

  # Job (Security check with CodeQL)
  check:
    name: Code Quality
    runs-on: ubuntu-latest
    # Wait until upload-artifact job finishes
    needs: [build]
    steps:
      # Step 1: Checkout repository code
      - uses: actions/checkout@v6
      # Step 2: Download build artifact uploaded by previous job
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: webgl
          path: .
      # Step 3: Initialize CodeQL for JavaScript/TypeScript
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
      # Step 4: Prepare artifact for analysis (list files)
      - name: Prepare artifact for analysis
        run: ls -R .
      # Step 5: Perform CodeQL analysis and upload results
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # Job (Publish to npm)
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    # Wait until both upload-artifact and CodeQL check jobs finish
    needs: [build, check]
    # Only run on version tags
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      # Step 1: Checkout repository code from main branch
      - uses: actions/checkout@v6
        with:
          ref: main
      # Step 2: Setup Node.js environment (fixed version for publishing)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      # Step 3: Install corepack globally
      - name: Install corepack@0.31
        run: npm install -g corepack@0.31
      # Step 4: Enable corepack (pnpm support)
      - name: Enable corepack
        run: corepack enable
      # Step 5: Configure npm authentication using secret token
      - name: Configure npm auth
        run: npm config set //registry.npmjs.org/:_authToken="${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      # Step 2: Download build artifact uploaded by previous job
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: webgl
          path: .
      # Step 7: Publish package to npm using artifact (no rebuild required)
      - name: Publish to npm
        run: pnpm publish dist --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}