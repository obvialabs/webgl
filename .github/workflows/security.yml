# Workflow name
name: Check Security

# Workflow conditions
on:
  # Run on pushes to main branch
  push:
    branches: [ main ]
  # Run on pull requests targeting main branch
  pull_request:
    branches: [ main ]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Permissions required for CodeQL to upload results
permissions:
  actions: read
  contents: read
  security-events: write

# Workflow jobs
jobs:
  # Job (CodeQL Analysis)
  analyze:
    # Job name shown in GitHub Actions UI
    name: Analysis with CodeQL
    # Runner environment (Ubuntu)
    runs-on: ubuntu-latest

    # Job steps
    steps:
      # Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download build artifact from build workflow
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: .

      # Initialize CodeQL for JavaScript/TypeScript
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      # Use artifact instead of rebuilding
      - name: Prepare artifact for analysis
        run: ls -R dist

      # Perform CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
